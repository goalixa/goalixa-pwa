name: Build PWA Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  REGISTRY: harbor.goalixa.com
  IMAGE_REPOSITORY: goalixa-pwa/pwa

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inject build info into Service Worker
        run: |
          # Add commit SHA to service worker to force cache invalidation
          BUILD_INFO="// Build: ${{ github.sha }} ($(date -u +%Y-%m-%dT%H:%M:%SZ))\n"
          echo -e "$BUILD_INFO" | cat - sw.js > sw.js.tmp && mv sw.js.tmp sw.js
          echo "Service worker updated with build info"

      - name: Update Kustomize image tag
        run: |
          # Get the short SHA with sha- prefix to match Docker metadata action format
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"
          # Update the kustomization file with the new image tag
          sed -i.bak "s/newTag: .*/newTag: ${IMAGE_TAG}/" k8s/kustomization.yaml
          rm -f k8s/kustomization.yaml.bak
          # Show the change
          echo "Updated k8s/kustomization.yaml:"
          grep "newTag:" k8s/kustomization.yaml

      - name: Commit and push changes
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA:0:7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml sw.js
          git commit -m "chore: update image tag to ${IMAGE_TAG}"
          git push
