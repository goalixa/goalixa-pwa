name: Build PWA Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  REGISTRY: harbor.goalixa.com
  IMAGE_REPOSITORY: goalixa-pwa/pwa

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kustomize image tag
        run: |
          # Get the short SHA
          SHORT_SHA="${{ github.sha }}"
          # Update the kustomization file with the new image tag
          sed -i.bak "s/newTag: .*/newTag: ${SHORT_SHA}/" k8s/kustomization.yaml
          rm -f k8s/kustomization.yaml.bak
          # Show the change
          echo "Updated k8s/kustomization.yaml:"
          grep "newTag:" k8s/kustomization.yaml

      - name: Commit and push Kustomize change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push
