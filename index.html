<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="description" content="Goalixa PWA workspace for goals, projects, tasks, and planning." />
  <meta name="theme-color" content="#0f172a" />

  <!-- Apple iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Goalixa" />

  <!-- Mobile Optimization Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Goalixa" />
  <meta name="msapplication-TileColor" content="#0f172a" />
  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- Safe Area Insets for iPhone X+ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />

  <!-- Prevent automatic text zoom on iOS -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="format-detection" content="email=no" />
  <meta name="format-detection" content="address=no" />

  <!-- SEO & Social -->
  <meta name="keywords" content="goals, tasks, projects, planning, productivity, PWA" />
  <meta name="author" content="Goalixa" />
  <meta property="og:title" content="Goalixa - Goals, Tasks & Projects" />
  <meta property="og:description" content="Goals, plans, projects, and tasks in one app." />
  <meta property="og:type" content="website" />
  <meta property="og:theme-color" content="#0f172a" />

  <title>Goalixa PWA</title>

  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem('goalixa-theme');
        const isDark = storedTheme
          ? storedTheme === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } catch (error) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Asset Configuration - Load external fonts/icons from local or CDN -->
  <script src="/js/config.js"></script>
  <script>
    // Load assets immediately after config
    AssetConfig.loadAssets();
  </script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Apple Touch Icons for all iOS devices -->
  <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72.png" />
  <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96.png" />
  <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="384x384" href="/icons/icon-384.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

  <!-- External Fonts - Loaded dynamically based on environment -->
  <!-- See js/config.js for local vs CDN configuration -->
  <script src="/vendor/apexcharts/apexcharts.min.js"></script>

  <!-- Charts Module -->
  <script src="/js/charts.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <!-- View Container - content will be injected here -->
    <main id="view-container" aria-live="polite"></main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Runtime config -->
  <script>
    (() => {
      const host = window.location.hostname;
      const isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
      if (isLocal) {
        // For local development, use relative URLs (nginx proxy handles routing)
        window.__GOALIXA_API_BASE__ = '';
      }
    })();
  </script>

  <!-- Scripts -->
  <!-- Load router as module - it will import dependencies -->
  <script type="module" src="/js/router.js"></script>

  <!-- Service Worker Registration -->
  <script>
    function showUpdateNotification() {
      const toast = document.createElement('div');
      toast.className = 'toast toast-info';
      toast.innerHTML = `
        <i class="fas fa-info-circle"></i>
        <span>New version available!</span>
        <button class="toast-update-btn">Refresh</button>
      `;
      document.getElementById('toast-container').appendChild(toast);

      const updateBtn = toast.querySelector('.toast-update-btn');
      updateBtn.addEventListener('click', () => {
        window.location.reload();
      });

      setTimeout(() => toast.remove(), 30000);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        const host = window.location.hostname;
        const isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';

        if (isLocal) {
          // Prevent stale localhost caches from old builds.
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));

          if ('caches' in window) {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map((key) => caches.delete(key)));
          }
          return;
        }

        try {
          const registration = await navigator.serviceWorker.register('/sw.js', {
            scope: '/'
          });
          console.log('[PWA] Service Worker registered:', registration.scope);

          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateNotification();
              }
            });
          });

          navigator.serviceWorker.addEventListener('message', (event) => {
            console.log('[PWA] Message from service worker:', event.data);
          });

          window.addEventListener('focus', () => {
            registration.update();
          });
        } catch (error) {
          console.error('[PWA] Service Worker registration failed:', error);
        }
      });
    }
  </script>
</body>
</html>
