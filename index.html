<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="description" content="Goalixa PWA workspace for goals, projects, tasks, and planning." />
  <meta name="theme-color" content="#0f172a" />

  <!-- Apple iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Goalixa" />

  <!-- Mobile Optimization Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Goalixa" />
  <meta name="msapplication-TileColor" content="#0f172a" />
  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- Safe Area Insets for iPhone X+ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />

  <!-- Prevent automatic text zoom on iOS -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="format-detection" content="email=no" />
  <meta name="format-detection" content="address=no" />

  <!-- SEO & Social -->
  <meta name="keywords" content="goals, tasks, projects, planning, productivity, PWA" />
  <meta name="author" content="Goalixa" />
  <meta property="og:title" content="Goalixa - Goals, Tasks & Projects" />
  <meta property="og:description" content="Goals, plans, projects, and tasks in one app." />
  <meta property="og:type" content="website" />
  <meta property="og:theme-color" content="#0f172a" />

  <title>Goalixa PWA</title>

  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem('goalixa-theme');
        const isDark = storedTheme
          ? storedTheme === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } catch (error) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Asset Configuration - Load external fonts/icons from local or CDN -->
  <script src="/js/config.js"></script>
  <script>
    // Load assets immediately after config
    AssetConfig.loadAssets();
  </script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Apple Touch Icons for all iOS devices -->
  <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72.png" />
  <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96.png" />
  <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="384x384" href="/icons/icon-384.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

  <!-- External Libraries - Loaded from CDN -->
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.1/dist/apexcharts.min.js"></script>

  <!-- Charts Module -->
  <script src="/js/charts.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <!-- View Container - content will be injected here -->
    <main id="view-container" aria-live="polite"></main>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Runtime config -->
  <script>
    (() => {
      const host = window.location.hostname;
      const isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
      if (isLocal) {
        // For local development, use relative URLs (nginx proxy handles routing)
        window.__GOALIXA_API_BASE__ = '';
      }
    })();
  </script>

  <!-- Scripts -->
  <!-- Load router as module - it will import dependencies -->
  <script type="module" src="/js/router.js"></script>

  <!-- Service Worker Registration -->
  <script>
    (function() {
      'use strict';

      let updateModal = null;

      function showUpdateNotification(onUpdate) {
        closeUpdateModal();

        const modal = document.createElement('div');
        modal.className = 'pwa-update-modal-overlay';
        modal.id = 'pwa-update-modal';
        modal.innerHTML = `
          <div class="pwa-update-modal" role="dialog" aria-modal="true">
            <div class="pwa-update-modal-icon">
              <i class="bi bi-arrow-repeat"></i>
            </div>
            <div class="pwa-update-modal-content">
              <h2>New Version Available</h2>
              <p>A new version of Goalixa is ready to install.</p>
            </div>
            <div class="pwa-update-modal-actions">
              <button type="button" class="btn btn-outline-secondary pwa-update-dismiss-btn">Not Now</button>
              <button type="button" class="btn btn-primary pwa-update-apply-btn">
                <i class="bi bi-download"></i> Get New Version
              </button>
            </div>
            <button type="button" class="pwa-update-modal-close" aria-label="Close">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        `;

        document.body.appendChild(modal);
        updateModal = modal;

        requestAnimationFrame(() => modal.classList.add('is-visible'));

        modal.querySelector('.pwa-update-apply-btn').addEventListener('click', async () => {
          const btn = modal.querySelector('.pwa-update-apply-btn');
          btn.disabled = true;
          btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Updating...';
          try {
            if (typeof onUpdate === 'function') await onUpdate();
          } catch (error) {
            console.error('[PWA] Update failed:', error);
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-download"></i> Retry';
          }
        });

        modal.querySelector('.pwa-update-dismiss-btn').addEventListener('click', closeUpdateModal);
        modal.querySelector('.pwa-update-modal-close').addEventListener('click', closeUpdateModal);
        modal.addEventListener('click', (e) => {
          if (e.target === modal) closeUpdateModal();
        });
      }

      function closeUpdateModal() {
        if (updateModal) {
          updateModal.classList.remove('is-visible');
          setTimeout(() => {
            if (updateModal && updateModal.parentNode) {
              updateModal.remove();
            }
            updateModal = null;
          }, 300);
        }
      }

      window.testPWAUpdate = function() {
        console.log('[PWA] Testing update notification...');
        showUpdateNotification(async () => {
          console.log('[PWA] Clearing caches...');
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
          }
          console.log('[PWA] Refreshing...');
          location.reload(true);
        });
      };

      console.log('[PWA] Loaded! Run testPWAUpdate() to test');

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            // Clean up first
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.unregister()));
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
            console.log('[PWA] Cleaned up old SW and caches');

            // Register new SW
            const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
            console.log('[PWA] Service Worker registered');

            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] New version available!');
                  showUpdateNotification(async () => {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                    await new Promise(r => {
                      const h = () => { navigator.serviceWorker.removeEventListener('controllerchange', h); r(); };
                      navigator.serviceWorker.addEventListener('controllerchange', h);
                      setTimeout(() => { navigator.serviceWorker.removeEventListener('controllerchange', h); r(); }, 3000);
                    });
                    const keys = await caches.keys();
                    await Promise.all(keys.map(k => caches.delete(k)));
                    await new Promise(res => setTimeout(res, 100));
                    location.reload(true);
                  });
                }
              });
            });

            window.addEventListener('focus', () => reg.update().catch(() => {}));
          } catch (error) {
            console.error('[PWA] Setup failed:', error);
          }
        });
      }
    })();
  </script>
</body>
</html>
