events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    types {
        application/manifest+json webmanifest;
        application/javascript js mjs;
    }

    # Logging for debugging
    access_log /dev/stdout;
    error_log /dev/stderr;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # No caching for development - always get fresh files
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # CORS headers for local development
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # JavaScript modules - ensure correct MIME type
        location ~* \.m?js$ {
            add_header Content-Type application/javascript always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # Service worker - no cache
        location = /sw.js {
            add_header Content-Type application/javascript always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # ===== MOCK API ENDPOINTS FOR AUTH BYPASS =====

        # Mock /bff/auth/me - returns mock authenticated user
        location = /bff/auth/me {
            default_type application/json;
            return 200 '{"user":{"id":1,"email":"dev@goalixa.local","name":"Dev User","created_at":"2024-01-01T00:00:00Z"}}';
        }

        # Mock login - always succeeds
        location = /bff/auth/login {
            default_type application/json;
            return 200 '{"success":true,"user":{"id":1,"email":"dev@goalixa.local","name":"Dev User"}}';
        }

        # Mock logout
        location = /bff/auth/logout {
            default_type application/json;
            return 200 '{"success":true}';
        }

        # Mock token refresh
        location = /bff/auth/refresh {
            default_type application/json;
            return 200 '{"success":true,"access_token":"dev-token"}';
        }

        # Mock other auth endpoints
        location /bff/auth/ {
            default_type application/json;
            return 200 '{"success":true}';
        }

        # ===== MOCK APP API ENDPOINTS =====
        # Uncomment proxy_pass lines to connect to a real backend instead

        location ~ ^/bff/app/tasks {
            # proxy_pass http://host.docker.internal:8000;
            default_type application/json;
            return 200 '{"tasks":[{"id":1,"name":"Sample Task","status":"pending","project_id":null}]}';
        }

        location ~ ^/bff/app/projects {
            # proxy_pass http://host.docker.internal:8000;
            default_type application/json;
            return 200 '{"projects":[{"id":1,"name":"Sample Project","color":"#3B82F6"}]}';
        }

        location ~ ^/bff/app/goals {
            # proxy_pass http://host.docker.internal:8000;
            default_type application/json;
            return 200 '{"goals":[]}';
        }

        location ~ ^/bff/app/habits {
            # proxy_pass http://host.docker.internal:8000;
            default_type application/json;
            return 200 '{"habits":[]}';
        }

        location ~ ^/bff/app/time-entries {
            # proxy_pass http://host.docker.internal:8000;
            default_type application/json;
            return 200 '{"time_entries":[]}';
        }

        location ~ ^/bff/app/labels {
            # proxy_pass http://host.docker.internal:8000;
            default_type application/json;
            return 200 '{"labels":[]}';
        }

        location ~ ^/bff/app/reminders {
            # proxy_pass http://host.docker.internal:8000;
            default_type application/json;
            return 200 '{"reminders":[]}';
        }

        location ~ ^/bff/aggregate/dashboard {
            default_type application/json;
            return 200 '{"tasks":[],"projects":[],"goals":[],"habits":[],"time_entries":[],"active_timer":null}';
        }

        location ~ ^/bff/aggregate/planner {
            default_type application/json;
            return 200 '{"tasks":[],"daily_todos":[],"weekly_goals":[]}';
        }

        location ~ ^/bff/aggregate/ {
            default_type application/json;
            return 200 '{"tasks":[],"projects":[],"goals":[],"habits":[],"time_entries":[],"labels":[],"reminders":[]}';
        }

        # Catch-all for other /bff/ routes
        location /bff/ {
            default_type application/json;
            return 200 '{"success":true,"data":{}}';
        }

        # ===== STATIC FILES =====

        # SPA fallback - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            default_type text/plain;
        }
    }
}
