apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goalixa-pwa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app: goalixa-pwa
    app.kubernetes.io/part-of: goalixa
    environment: production
spec:
  project: default
  source:
    repoURL: https://github.com/goalixa/goalixa-pwa.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values-production.yaml
      parameters:
        - name: image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: goalixa-pwa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
